services:
  marketplace:
    build: .
    container_name: marketplace
    networks:
      - jasper
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/marketplace.db
    volumes:
      - ./data:/data
      - ./app/static/assets/images/user_uploaded:/app/static/assets/images/user_uploaded

networks:
  jasper:
    external: true