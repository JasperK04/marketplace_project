<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title or 'Marketplace'}}</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/base.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/' + request.path.split('/')[-1] if request.path.split('/')[-1] != '' else 'index' + '.css') }}">
</head>
<body>
    <div class="header">
        <!-- first logo img, then other links, then next pages -->
        <div class="logo-header">
            <a href="{{ url_for('index') }}"><img src="images/placeholder.png"></a>
        </div>

        <div class="ref-links">
            <ul>
                <a href="{{ url_for('index') }}">Listings</a>
                <a href="{{ url_for('index')}}"></a>
            </ul>
        </div>

        {% if current_user.is_anonymous %}
        <div class="login">
            <a class="btn" href="{{ url_for('index') }}">Login</a>
        </div>

        <div class="sign-up">
            <a class="btn" href="{{ url_for('index' )}}">Sign Up!</a>
        </div>

        {% else %}
        <div class="profile">
            <a href="{{ url_for('index') }}">Profile</a>
        </div>

        <div class="logout">
            <a class="btn" href="{{ url_for('index')}}">Logout</a>
        </div>
        {% endif %}
    </div>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    <div class="footer">
        <div>
            <ul>
                <a href="{{ url_for('index') }}">About Us</a>
                <a href="{{ url_for('index') }}">Contact Us</a>
            </ul>
        </div>
        <div>
            <ul>
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('index') }}">Listings</a>
            </ul>
        </div>
        <div>
            <ul>
                <a href="{{ url_for('index') }}">Categories:</a>
            </ul>
        </div>
        <div class="logo-footer">
            <a href="{{ url_for('index') }}"><img src="images/placeholder.png"></a>
        </div>
        <div class="copyright">
            <p>&copy; Marketplace <span id="year"></span></p>
            <script>
                document.getElementById("year").innerText = new Date().getFullYear();
            </script>
        </div>
    </div>
</body>
</html>
