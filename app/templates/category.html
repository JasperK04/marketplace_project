{% extends 'base.html' %}

{% block title %}{{ category.name }} - Marketplace{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/category.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/listing_card.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/listing_grid.css') }}">
{% endblock %}

{% block content %}
    <div class="category">
        <div class="category-meta">
            <h1>{{ category.name }}</h1>
            <p>{{ category.description }}</p>
        </div>
        <div class="listings">
            {% for listing in listings %}
                {% include 'components/listing_card.html' %}
            {% endfor %}
        </div>
    </div>
{% endblock %}
