{% block styles %}
<link rel="stylesheet" href="{{url_for('static', filename='/css/login.css')}}">
{% endblock %}

{% extends "base.html" %}


{% block content %}
    <h1>Sign in</h1>
    <form action="" method="post" novalidate>
        {{ form.hidden_tag() }}
        <div>
            {{ form.username.label }}<br>
            {{ form.username(size=32) }}
        </div>
        <div>
            {{ form.password.label }}<br>
            {{ form.password(size=32) }}
        </div>
        <div>
            <label class="checkbox">{{ form.remember_me() }} <span class="checkbox_label">remember me</span></label>
        </div>
        <div>
            {{ form.submit() }}
        </div>
    </form>
    <hr>
    <p class="new-user-callout">
        New User?<br/>
        <button class="outline"><a href="{{ url_for('routes.register') }}">Click to Register!</a></button>
    </p>
{% endblock %}
