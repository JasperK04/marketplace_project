<section class="listing-card">
    <link rel="stylesheet" href="{{url_for('static', filename='/css/components/listing_card.css')}}">
    <a href="{{ url_for('listing', listing_id=listing.id) }}">
        <div class="listing-image">
            {% if listing.filename %}
            <img class="listing-image" src="{{url_for('static',filename='assets/images/user_uploaded/listings/'+ listing.filename)}}" alt="{{ listing.title }}">
            {% else %}
            <img src="https://placehold.co/300x200" alt="">
            {% endif %}
        </div>
        <div class="listing-content">
            <div>{{ listing.title }}</div>
            <div>{{ listing.price}}</div>
        </div>
    </a>
</section>
