<section class="listing-card">
    <a href="{{ url_for('listing', listing_id=listing.id) }}">
        <div class="listing-image">
            <img width="300" height="200" src="https://placehold.co/300x200" alt="">
        </div>
        <div class="listing-content">
            <div class="listing-label listing-title">{{ listing.title }}</div>
            <div class="listing-label listing-price">&euro;{{ listing.price / 100 }}</div>
        </div>
    </a>
</section>
